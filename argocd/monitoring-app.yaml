apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: observability-platform
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/<your-username>/kubernetes-observability-platform.git
    targetRevision: HEAD
    path: monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
