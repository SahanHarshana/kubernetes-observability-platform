apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: gitlab-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.gitlab.io
    chart: gitlab
    targetRevision: 8.10.0

    helm:
      valueFiles:
        - $values/gitlab/gitlab-values.yaml

  sources:
    - repoURL: https://charts.gitlab.io
      chart: gitlab
      targetRevision: 8.10.0

      helm:
        valueFiles:
          - $values/gitlab/gitlab-values.yaml

    - repoURL: https://github.com/SahanHarshana/kubernetes-observability-platform.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
