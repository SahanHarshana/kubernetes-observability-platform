apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: minio-storage
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/SahanHarshana/kubernetes-observability-platform.git
    targetRevision: main
    path: cortex

  destination:
    server: https://kubernetes.default.svc
    namespace: storage/minio

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
