apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: grafana-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/SahanHarshana/kubernetes-observability-platform.git
    targetRevision: main
    path: monitoring/grafana

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
