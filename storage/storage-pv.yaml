apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-pv
  namespace: storage

spec:
  capacity:
    storage: 5Gi

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  hostPath:
    path: /data/minio

---

