  name: grafana-pv
  namespace: storage

spec:
  capacity:
    storage: 2Gi

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  hostPath:
    path: /data/grafana

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-pv
